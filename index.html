<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>For My Babyyy 💖</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="hearts"></div>

<div class="container">
  <h1>Happy 1 Month Babyyy 💖</h1>
  <p id="timer"></p>

  <button onclick="showLoveLetter()">Open Something Special 💌</button>
  <button onclick="playMusic()">Play Our Song 🎵</button>

  <!-- 💌 Love Letter -->
  <div id="letterBox" class="letter hidden">
    <p id="letterText"></p>
  </div>

  <h2>My Favorite Pictures of You 🥺💖</h2>
  <div class="gallery">
    <div class="card">
      <img src="images/photo1.jpg">
      <p>my pretty babyyy 💕</p>
    </div>

    <div class="card">
      <img src="images/photo2.jpg">
      <p>this smile >>> everything 😭💖</p>
    </div>

    <div class="card">
      <img src="images/photo3.jpg">
      <p>how are you this cute?? 😭</p>
    </div>
  </div>

  <h2>Why I Love You Babyyy 💗</h2>
  <ul class="reasons">
    <li>the way you say my name 🥺</li>
    <li>your cute anger 😤💕</li>
    <li>how you care for me 💖</li>
    <li>you’re literally my peace 🌸</li>
  </ul>

</div>

<audio id="bgMusic" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<script src="script.js"></script>
</body>
</html>
