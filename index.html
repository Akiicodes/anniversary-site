<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>For My Babyyy 💖</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="hearts"></div>

<div class="container">
  <h1>Happy 1 Month Babyyy 💖</h1>
  <p id="timer"></p>

  <button onclick="showLoveLetter()">Open Something Special 💌</button>
  <button onclick="playMusic()">Play Our Song 🎵</button>

  <!-- 💌 Love Letter -->
  <div id="letterBox" class="letter hidden">
    <p id="letterText"></p>
  </div>

  <h2>My Favorite Pictures of You 🥺💖</h2>
  <div class="gallery">

  <div class="card">
    <img src="images/photo1.jpg" onclick="openPopup(this, 'my babyyy 💕')">
    
  </div>

  <div class="card">
    <img src="images/photo2.jpg" onclick="openPopup(this, 'this smile 😭💖')">
    
  </div>

  <div class="card">
    <img src="images/photo3.jpg" onclick="openPopup(this, 'cutest person alive 🥺')">

  </div>

  <div class="card">
    <img src="images/photo4.jpg" onclick="openPopup(this, 'i love this one so much 💗')">
    
  </div>

  <div class="card">
    <img src="images/photo5.jpg" onclick="openPopup(this, 'how are you this pretty 😭')">
    
  </div>

  <div class="card">
    <img src="images/photo6.jpg" onclick="openPopup(this, 'my favorite girl 💖')">
    
  </div>

  <div class="card">
    <img src="images/photo7.jpg" onclick="openPopup(this, 'you’re my peace 🌸')">
  
  </div>

  <div class="card">
    <img src="images/photo8.jpg" onclick="openPopup(this, 'obsessed with you 😭💗')">
  </div>

  <div class="card">
    <img src="images/photo9.jpg" onclick="openPopup(this, 'this >>> everything 💕')">
  </div>

  <div class="card">
    <img src="images/photo10.jpg" onclick="openPopup(this, 'my babyyy forever 💖')">
  </div>

</div>

<audio id="bgMusic" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<script src="script.js"></script>
<!-- 💖 Popup -->
<div id="popup" class="popup hidden">
  <span class="close" onclick="closePopup()">×</span>
  <img id="popupImg">
  <p id="popupText"></p>
</div>
</body>
</html>
